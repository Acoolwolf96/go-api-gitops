apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-api
  template:
    metadata:
      labels:
        app: go-api
    spec:
      containers:
        - name: go-api
          image: 192.168.1.172:30500/go-api:80e9ce9b9464b2dcae49ecba7ff6a97030e456e1
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: go-api
  namespace: default
spec:
  type: NodePort
  selector:
    app: go-api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30600